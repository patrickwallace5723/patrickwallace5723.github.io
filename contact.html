    <h2>Contact Us</h2>
    <p>Interested in partnering with AshGen, learning more about our technology, or exploring what we can do with your fly ash stream? We'd love to hear from you.</p>

    <form class="contact-form" action="https://formspree.io/f/mzdjbeyo" method="POST">

      <input type="email" name="email" placeholder="Your Email" required />
      <input type="text" name="company" placeholder="Company (optional)" />
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
