<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — AshGen</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="topline"></div>

  <nav>
    <div class="nav-container">
      <a class="nav-logo" href="index.html">
        <img src="images/logo.png" alt="AshGen Logo" />
        AshGen
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="contact-page-section">
      <div class="contact-page-container">
        
        <div class="contact-header">
          <span class="panel-tag">Get in Touch</span>
          <h1>Contact Us</h1>
          <p class="contact-lede">Interested in partnering with AshGen, learning more about our technology, or exploring what we can do with your fly ash stream? We’d love to hear from you.</p>
        </div>

        <form class="contact-page-form" action="https://formspree.io/f/mzdjbeyo" method="POST">
          
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-ctrl" placeholder="Your Name" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-ctrl" placeholder="name@company.com" required />
          </div>

          <div class="form-group">
            <label for="company">Company (optional)</label>
            <input type="text" id="company" name="company" class="form-ctrl" placeholder="Company name" />
          </div>

          <div class="form-group">
            <label for="message">Comment</label>
            <textarea id="message" name="message" class="form-ctrl form-textarea" placeholder="Your message..." required></textarea>
          </div>

          <div class="form-submit-row">
            <button type="submit" class="btn-pill btn-submit">Send Message</button>
          </div>

        </form>

      </div>
    </section>
  </main>

  <footer>
    <div class="footer-wrap">
      <div class="foot-left">
        <div class="foot-brand">
          <img src="images/logo.png" alt="AshGen Logo" />
          <span>AshGen</span>
        </div>
        <div class="foot-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
      <div class="foot-right">
        <p>&copy; 2026 AshGen Inc.<br>All rights reserved.<br><span class="footer-domain">ash-gen.com</span></p>
      </div>
    </div>
  </footer>

</body>
</html>
